apiVersion: apps/v1 
kind: ReplicaSet 
metadata: 
  name: my-rs 
  labels: 
    app: myapp
spec: 
  replicas: 2 
  selector: 
    matchLabels: 
      app: myapp
  template: 
    metadata: 
      name: my-rs-template
      labels: 
        app: myapp
    spec: 
      containers: 
        - name: tomcat-image
          image: ashish050904/my-web-app
          ports: 
            - name: nginxport
              containerPort: 8080
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: rs-svc 
  labels: 
    app: myapp
spec: 
  type: NodePort
  selector: 
    app: myapp
  ports: 
    - name: svc-port 
      protocol: TCP 
      port: 8080
      targetPort: 8080