apiVersion: apps/v1 
kind: DaemonSet 
metadata: 
  name: my-daemon 
  labels: 
    app: myapp
spec: 
  selector: 
    matchLabels: 
      app: myapp 
  template: 
    metadata: 
      name: my-template 
      labels: 
        app: myapp 
    spec: 
      containers: 
        - name: nginx-container 
          image: nginx:latest
          ports: 
            - name: nginx-port
              containerPort: 80