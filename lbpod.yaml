apiVersion: v1
kind: Pod
metadata:
  - name: lbpod
    labels:
    app:
spec:
 containers:
  - name: nginx:container
    image: nginx:latest
    ports:
      - name: nginxport
        containerport: 80 
---
apiVersion: v1
kind: service
metadata:
  name: lbpod-service
  labels: 
   app: lbpod
spec:
 type: LoadBalancer
 selector:
  app: lbpod
  ports:
    - name: nginxsvc-port
      portocol: TCP
      port: 80
      targetPort: 80 