apiVersion: v1
kind: Pod
metadata:
  - name: mypod
    labels:
    app: myapp
spec:
 containers:
   - name: nginx-container
     image: nginx:latest
     ports:
     - name: nginxport
       containerport: 80
...
---
apiVersion: v1
kind: service
metadata:
  - name: ciservice
    labels:
     app: myapp
spec:
 type: ClusterIP
 selector:
 app: myapp
ports:
  - name: nginxsvc-ports
    portocol: TCP
    port: 80
    targetPort: 80
...